name: Build Windows Addon Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag to build (e.g., v1.0.0)'
        required: true
        type: string

env:
  LIBFIVE_CHECKOUT_DIR: libfive_src
  CMAKE_BUILD_TYPE: Release
  LIBFIVE_COMMIT_SHA: '379a54dbbdfd0724100baa6feddb7083ab0e6767'
  ADDON_NAME: FieldForge
  VCPKG_TRIPLET: x64-windows

jobs:
  build_and_package_windows:
    name: Build libfive and Package Addon (Windows)
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout libfive Source Code
        uses: actions/checkout@v4
        with:
          repository: AonoZan/libfive
          ref: ${{ env.LIBFIVE_COMMIT_SHA }}
          path: ${{ env.LIBFIVE_CHECKOUT_DIR }}
          fetch-depth: 0

      - name: Exclude build directory from Defender
        shell: powershell
        run: |
          Add-MpPreference -ExclusionPath "${{ github.workspace }}\build"

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'b322364f06308bdd24823f9d8f03fe0cc86fd46f'
          vcpkgDirectory: ${{ github.workspace }}/vcpkg_root
          runVcpkgInstall: false

      - name: Install dependencies
        shell: powershell
        run: |
          & "${{ github.workspace }}\vcpkg_root\vcpkg.exe" install pkgconf eigen3 libpng zlib boost-math boost-algorithm boost-functional boost-lockfree boost-interval boost-bimap boost-container --triplet ${{ env.VCPKG_TRIPLET }} --binarysource=clear
      
      - name: Enable Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        
      - name: Configure CMake (Forcing VS 2019 Toolset)
        shell: powershell
        run: |
          # The -T v142 flag forces VS 2022 to use the VS 2019 compiler, matching your local build!
          cmake -S libfive_src -B build `
          -G "Visual Studio 17 2022" -T v142 `
          -DCMAKE_BUILD_TYPE=Release `
          -DBUILD_SHARED_LIBS=ON `
          -DBUILD_STUDIO_APP=OFF `
          -DBUILD_GUILE_BINDINGS=OFF `
          -DBUILD_PYTHON_BINDINGS=ON `
          -DENABLE_DEBUG=OFF `
          -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg_root/scripts/buildsystems/vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET=${{ env.VCPKG_TRIPLET }} `
          -DCMAKE_CXX_FLAGS="/DEIGEN_MAX_ALIGN_BYTES=0 /DEIGEN_DONT_VECTORIZE=ON /D_CRT_SECURE_NO_WARNINGS"

      - name: Build libfive
        run: cmake --build build --config ${{ env.CMAKE_BUILD_TYPE }} --parallel
        shell: powershell

      - name: Checkout Addon Repository Code
        uses: actions/checkout@v4
        with:
          path: addon_code

      - name: Determine Version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version_tag }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          fi
        shell: bash
  
      - name: Prepare Staging Directory and Copy Addon Files
        run: |
          $ErrorActionPreference = "Stop"
          $stagingRoot = "staging"
          $addonDestDir = Join-Path -Path $stagingRoot -ChildPath "${{ env.ADDON_NAME }}"
      
          if (-not (Test-Path $stagingRoot)) { mkdir $stagingRoot | Out-Null }
          if (Test-Path $addonDestDir) {
            Get-ChildItem -Path $addonDestDir -Exclude "libfive" -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          } else { mkdir $addonDestDir | Out-Null }
      
          robocopy addon_code $addonDestDir /E /XD .git* .github* tests /XF .gitignore Example.blend README.md screenshot.png libfive Screenshot.xcf GEMINI.md* demo.gif
          if ($LASTEXITCODE -ge 8) { exit $LASTEXITCODE }
      
          $libfiveBase = Join-Path -Path $addonDestDir -ChildPath "libfive"
          $libfiveSrc = Join-Path -Path $libfiveBase -ChildPath "src"
          $libfiveStdlib = Join-Path -Path $libfiveBase -ChildPath "stdlib"
          if (-not (Test-Path $libfiveBase))   { mkdir $libfiveBase | Out-Null }
          if (-not (Test-Path $libfiveSrc))    { mkdir $libfiveSrc | Out-Null }
          if (-not (Test-Path $libfiveStdlib)) { mkdir $libfiveStdlib | Out-Null }
          exit 0
        shell: powershell

      - name: Copy Python Bindings from libfive build
        run: |
          $libfiveDest = "staging/${{ env.ADDON_NAME }}/libfive"
          $stdlibDest = "staging/${{ env.ADDON_NAME }}/libfive/stdlib"
          Copy-Item build/libfive/bind/python/libfive/*.py $libfiveDest/
          Copy-Item build/libfive/bind/python/libfive/stdlib/*.py $stdlibDest/
        shell: powershell

      - name: Copy Compiled Libraries
        shell: powershell
        run: |
          $buildDir = "build"
          $targetDir = "staging/FieldForge/libfive/src"
          
          Copy-Item "$buildDir/libfive/src/Release/libfive.dll" -Destination $targetDir -Force
          Copy-Item "$buildDir/libfive/stdlib/Release/libfive-stdlib.dll" -Destination $targetDir -Force
          Copy-Item "$buildDir/custom_c_utils/Release/custom_c_utils.dll" -Destination "$targetDir/libcustom_c_utils.dll" -Force
          
          $vcpkgBinDir = "${{ github.workspace }}/vcpkg_root/installed/${{ env.VCPKG_TRIPLET }}/bin"
          Copy-Item "$vcpkgBinDir/libpng16.dll" -Destination $targetDir -Force
          Copy-Item "$vcpkgBinDir/zlib1.dll" -Destination $targetDir -Force

      - name: Create Windows zip file (Using Tar)
        shell: powershell
        run: tar -a -c -f "${{ env.ADDON_NAME }}-win-${{ env.VERSION }}.zip" -C staging "${{ env.ADDON_NAME }}"
      
      - name: Create Release and Upload Windows Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag || github.ref_name }}
          name: Release ${{ env.VERSION }} (libfive @${{ env.LIBFIVE_COMMIT_SHA }})
          draft: false
          prerelease: contains(env.VERSION, '-')
          files: ${{ env.ADDON_NAME }}-win-${{ env.VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}