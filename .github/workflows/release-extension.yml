name: Bundle all platforms extension

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag to fetch and repackage (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Release Asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ inputs.version_tag }} \
            --repo ${{ github.repository }} \
            --pattern "FieldForge-lin-*.zip" \
            --dir .
          gh release download ${{ inputs.version_tag }} \
            --repo ${{ github.repository }} \
            --pattern "FieldForge-win-*.zip" \
            --dir .
          gh release download ${{ inputs.version_tag }} \
            --repo ${{ github.repository }} \
            --pattern "FieldForge-mac-*.zip" \
            --dir .

      - name: Prepare Staging and Zip
        run: |
          mkdir -p staging
          mkdir -p win
          mkdir -p mac
          
          unzip FieldForge-lin-*.zip -d staging
          unzip FieldForge-win-*.zip -d win
          unzip FieldForge-mac-*.zip -d mac
          
          mv win/FieldForge/libfive/src/* staging/FieldForge/libfive/src/
          mv mac/FieldForge/libfive/src/* staging/FieldForge/libfive/src/
          
          cd staging
          zip -r "../FieldForge-Blender-Extension-${{ inputs.version_tag }}.zip" FieldForge/
          cd ..

      - name: Upload as Release Asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ inputs.version_tag }} \
            FieldForge-Blender-Extension-${{ inputs.version_tag }}.zip \
            --repo ${{ github.repository }} \
            --clobber