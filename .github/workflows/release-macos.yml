name: Build macOS Addon Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag to build (e.g., v1.0.0 or v1.1.0-beta)'
        required: true
        type: string

env:
  LIBFIVE_CHECKOUT_DIR: libfive_src
  CMAKE_BUILD_TYPE: Release
  LIBFIVE_COMMIT_SHA: 'c9e97343e0af998cd1696e85583eccba95532b96'

jobs:
  build_and_package_macos:
    name: Build libfive and Package Addon (macOS)
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Checkout libfive Source Code
        uses: actions/checkout@v4
        with:
          repository: libfive/libfive
          ref: ${{ env.LIBFIVE_COMMIT_SHA }}
          path: ${{ env.LIBFIVE_CHECKOUT_DIR }}

      - name: Install libfive dependencies via Homebrew
        run: brew install cmake eigen libpng boost
      
      - name: Install Python dependencies
        run: |
          python3 -m pip install setuptools --break-system-packages
      


      - name: Configure CMake for libfive
        run: |
          BREW_PREFIX=$(brew --prefix)
          # Define the path to your venv python
          VENV_PYTHON="${{ github.workspace }}/venv/bin/python3"
          
          cmake -S ${{ env.LIBFIVE_CHECKOUT_DIR }} -B build \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_GUI=OFF \
            -DBUILD_STUDIO_APP=OFF \
            -DBUILD_GUILE_BINDINGS=OFF \
            -DBUILD_PYTHON_BINDINGS=ON \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install \
            -DCMAKE_PREFIX_PATH="$BREW_PREFIX/opt/eigen:$BREW_PREFIX/opt/libpng:$BREW_PREFIX/opt/boost" \
            -DBOOST_ROOT="$BREW_PREFIX/opt/boost" \
            -DPYTHON_EXECUTABLE="$VENV_PYTHON" \
            -DPYTHON_INSTALL_DIR="${{ github.workspace }}/install/python"
      
      - name: Build and Install libfive
        run: cmake --build build --config ${{ env.CMAKE_BUILD_TYPE }} --target install

      - name: Checkout Addon Repository Code
        uses: actions/checkout@v4
        with:
          path: addon_code
      
      - name: Copy Addon Python files
        run: |
          mkdir -p staging/FieldForge
          mkdir -p staging/FieldForge/libfive/src
          mkdir -p staging/FieldForge/libfive/stdlib
          mkdir -p staging/FieldForge/ui
          mkdir -p staging/FieldForge/core

          cp build/libfive/stdlib/libfive-stdlib.dylib staging/FieldForge/libfive/src/
          cp build/libfive/src/libfive.dylib staging/FieldForge/libfive/src/
          
          cp ${{ env.LIBFIVE_CHECKOUT_DIR }}/libfive/bind/python/libfive/*.py staging/FieldForge/libfive/
          cp ${{ env.LIBFIVE_CHECKOUT_DIR }}/libfive/bind/python/libfive/stdlib/*.py staging/FieldForge/libfive/stdlib/
          
          cp addon_code/*.py staging/FieldForge/
          cp addon_code/LICENSE staging/FieldForge/
          cp addon_code/ui/*.py staging/FieldForge/ui/
          cp addon_code/core/*.py staging/FieldForge/core/

      - name: Determine Version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version_tag }}" >> $GITHUB_ENV
          elif [[ $GITHUB_REF == refs/tags/* ]]; then
            # Extract the tag name (e.g., v0.7.1) and remove the refs/tags/ prefix
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          else
            # Fallback for branches
            echo "VERSION=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Prepare Filename
        run: |
          CLEAN_VERSION=$(echo "${{ env.VERSION }}" | sed 's/refs\/tags\///g' | sed 's/refs\/heads\///g' | sed 's/\//-/g')
          echo "CLEAN_VERSION=$CLEAN_VERSION" >> $GITHUB_ENV
      
      - name: Create macOS zip file
        run: |
          cd staging
          zip -r "../FieldForge-mac-${CLEAN_VERSION}.zip" FieldForge/

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag || github.ref_name }}
          # Use ${{ env.CLEAN_VERSION }} to access the variable
          name: Release ${{ env.CLEAN_VERSION }} (libfive @${{ env.LIBFIVE_COMMIT_SHA }})
          draft: false
          # Use env.CLEAN_VERSION here too
          prerelease: ${{ contains(env.CLEAN_VERSION, '-') }}
          # Use env.CLEAN_VERSION here
          files: FieldForge-mac-${{ env.CLEAN_VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}